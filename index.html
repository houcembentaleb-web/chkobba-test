<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chkobba - Jeu de cartes tunisien</title>
    <meta name="description" content="Jouez à la Chkobba, le jeu de cartes tunisien traditionnel. Mode Solo, Mode Champions, progression, super pouvoirs et plus encore !">
    <meta name="theme-color" content="#0D4728">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icons/icon-96.png">
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" rel="stylesheet">
</head>
<body data-no-float-ui="true">
    <div id="app">
        <div class="splash-screen" id="splash">
            <div style="text-align: center;">
                <div style="font-size: 4rem; margin-bottom: 1rem;">🃏</div>
                <div style="font-size: 1.5rem; color: #FFD700; margin-bottom: 0.5rem;">CHKOBBA</div>
                <div style="font-size: 0.8rem; color: rgba(255,255,255,0.6);">Chargement...</div>
                <div class="splash-spinner" style="margin-top: 2rem;"></div>
            </div>
        </div>
    </div>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1E7245 0%, #0D4728 100%);
            overflow: hidden;
        }
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1E7245, #0D4728);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100000;
            transition: opacity 0.5s ease;
        }
        .splash-spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto;
            border: 3px solid rgba(255, 215, 0, 0.2);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <script type="module">
        import { init, ProfileStore, ProfileUI } from './src/main.js';
        
        // Cacher le splash screen après initialisation
        window.addEventListener('load', async () => {
            await init();
            const splash = document.getElementById('splash');
            if (splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 500);
            }
            
            // Rediriger vers la sélection de jeu après 1s
            setTimeout(() => {
                window.location.href = 'select-game.html';
            }, 1000);
        });
    </script>
</body>
</html>
